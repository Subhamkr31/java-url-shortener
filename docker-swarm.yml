version: "3.7"
networks:
  url-shortener-net:
    driver: overlay
    attachable: true

volumes:
  mongoData:
    driver: local

services:
  nginx:
    image: nginx:latest
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    networks:
      - url-shortener-net
  app:
    image: url-shortener-app:v1
    environment:
      - MONGO_URI_FILE=/run/secrets/MONGO_URI
      - REDIS_URL=redis://cache:6379
    ports:
      - 8082:8082
    depends_on:
      - mongo
      - cache
    secrets:
      - MONGO_URI
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
    networks:
      - url-shortener-net

  mongo:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/MONGO_USER
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/MONGO_PASSWORD
    ports:
      - 27017:27017
    networks:
      - url-shortener-net
    secrets:
      - MONGO_USER
      - MONGO_PASSWORD
    volumes:
      - mongoData:/data/db

  cache:
    image: redis:latest
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
    ports:
      - 6379:6379
    networks:
      - url-shortener-net

secrets:
  MONGO_URI:
    external: true
  MONGO_USER:
    external: true
  MONGO_PASSWORD:
    external: true
